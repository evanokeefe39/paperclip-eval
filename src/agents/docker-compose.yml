x-agent: &agent
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      limits:
        memory: 512M

services:
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_PUBLIC_URL: "http://paperclip:3100"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-eval-secret-change-me}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
    volumes:
      - paperclip-data:/paperclip
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12

  ceo:
    <<: *agent
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_NAME: ceo
    ports:
      - "8081:8080"
    environment:
      PAPERCLIP_API_URL: "http://paperclip:3100"
      PAPERCLIP_ADMIN_EMAIL: "${PAPERCLIP_ADMIN_EMAIL:-admin@eval.local}"
      PAPERCLIP_ADMIN_PASS: "${PAPERCLIP_ADMIN_PASS:-eval-admin-2026}"
      PAPERCLIP_AGENT_ID: "${CEO_AGENT_ID:-}"
      PAPERCLIP_COMPANY_ID: "${PAPERCLIP_COMPANY_ID:-}"
    volumes:
      - ceo-workspace:/workspace
      - shared-artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

  researcher:
    <<: *agent
    build:
      context: .
      dockerfile: researcher/Dockerfile
    ports:
      - "8082:8080"
    environment:
      PAPERCLIP_API_URL: "http://paperclip:3100"
      PAPERCLIP_ADMIN_EMAIL: "${PAPERCLIP_ADMIN_EMAIL:-admin@eval.local}"
      PAPERCLIP_ADMIN_PASS: "${PAPERCLIP_ADMIN_PASS:-eval-admin-2026}"
      PAPERCLIP_AGENT_ID: "${RESEARCHER_AGENT_ID:-}"
      PAPERCLIP_COMPANY_ID: "${PAPERCLIP_COMPANY_ID:-}"
    volumes:
      - researcher-workspace:/workspace
      - shared-artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

  data:
    <<: *agent
    build:
      context: .
      dockerfile: data/Dockerfile
    ports:
      - "8083:8080"
    environment:
      PAPERCLIP_API_URL: "http://paperclip:3100"
      PAPERCLIP_ADMIN_EMAIL: "${PAPERCLIP_ADMIN_EMAIL:-admin@eval.local}"
      PAPERCLIP_ADMIN_PASS: "${PAPERCLIP_ADMIN_PASS:-eval-admin-2026}"
      PAPERCLIP_AGENT_ID: "${DATA_AGENT_ID:-}"
      PAPERCLIP_COMPANY_ID: "${PAPERCLIP_COMPANY_ID:-}"
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - data-workspace:/workspace
      - shared-artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

volumes:
  paperclip-data:
  ceo-workspace:
  researcher-workspace:
  data-workspace:
  shared-artifacts:
