services:
  ceo-agent:
    build: .
    ports:
      - "8081:8080"
    environment:
      - PI_PROVIDER=anthropic
      - PI_MODEL=claude-sonnet-4-20250514
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ceo-workspace:/workspace

  cto-agent:
    build: .
    ports:
      - "8082:8080"
    environment:
      - PI_PROVIDER=deepseek
      - PI_MODEL=deepseek-v4-pro
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - cto-workspace:/workspace

volumes:
  ceo-workspace:
  cto-workspace:
