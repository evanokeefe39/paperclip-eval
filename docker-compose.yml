name: paperclip-eval

x-agent-build: &agent-build
  context: src/agents
  dockerfile: Dockerfile

x-agent: &agent
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      limits:
        memory: 512M

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-paperclip-eval}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-artifact-db.sql:/docker-entrypoint-initdb.d/init-artifact-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/artifacts;
      mc mb --ignore-existing local/logs;
      mc mb --ignore-existing local/state;
      echo 'buckets ready';
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"

  artifact-service:
    build:
      context: src/artifact-service
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DATABASE_URL: "postgres://artifact:artifact-eval@postgres:5432/artifact_store"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18890"
    volumes:
      - ./src/agents/rbac.json:/app/rbac.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8090/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DASHBOARD__OTLP__HTTPENDPOINT: "http://0.0.0.0:18890"
    deploy:
      resources:
        limits:
          memory: 256M

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_PUBLIC_URL: "http://paperclip:3100"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://paperclip:3100,http://localhost:3100"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-eval-secret-change-me}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-paperclip-eval}@postgres:5432/paperclip"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12

  ceo:
    <<: *agent
    build:
      <<: *agent-build
      target: ceo
    ports:
      - "8081:8080"
    env_file:
      - .env
      - src/agents/ceo/.env
    environment:
      BRIDGE_TIMEOUT_MS: "300000"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18890"
    volumes:
      - ceo-workspace:/workspace
    depends_on:
      paperclip:
        condition: service_healthy
      artifact-service:
        condition: service_healthy

  researcher:
    <<: *agent
    build:
      <<: *agent-build
      target: researcher
    ports:
      - "8082:8080"
    env_file:
      - .env
      - src/agents/researcher/.env
    environment:
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY}"
      FINDING_STYLE: "intelligence"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18890"
    volumes:
      - researcher-workspace:/workspace
    depends_on:
      paperclip:
        condition: service_healthy
      artifact-service:
        condition: service_healthy

  data:
    <<: *agent
    build:
      <<: *agent-build
      target: data
    ports:
      - "8083:8080"
    env_file:
      - .env
      - src/agents/data/.env
    environment:
      GROQ_API_KEY: "${GROQ_API_KEY}"
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY}"
      FINDING_STYLE: "data"
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18890"
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - data-workspace:/workspace
    depends_on:
      paperclip:
        condition: service_healthy
      artifact-service:
        condition: service_healthy

  writer:
    <<: *agent
    build:
      <<: *agent-build
      target: writer
    ports:
      - "8084:8080"
    env_file:
      - .env
      - src/agents/writer/.env
    environment:
      ARTIFACT_SERVICE_URL: "http://artifact-service:8090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18890"
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - writer-workspace:/workspace
    depends_on:
      paperclip:
        condition: service_healthy
      artifact-service:
        condition: service_healthy

volumes:
  postgres-data:
    name: paperclip-eval-postgres-data
  minio-data:
    name: paperclip-eval-minio-data
  paperclip-data:
    name: paperclip-eval-data
  ceo-workspace:
    name: paperclip-eval-ceo-workspace
  researcher-workspace:
    name: paperclip-eval-researcher-workspace
  data-workspace:
    name: paperclip-eval-data-workspace
  writer-workspace:
    name: paperclip-eval-writer-workspace
