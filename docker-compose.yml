name: paperclip-eval

x-agent: &agent
  build:
    context: src/agents
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      limits:
        memory: 512M

services:
  dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    deploy:
      resources:
        limits:
          memory: 256M

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_PUBLIC_URL: "http://paperclip:3100"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://paperclip:3100,http://localhost:3100"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-eval-secret-change-me}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
    volumes:
      - paperclip-data:/paperclip
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12

  ceo:
    <<: *agent
    build:
      context: src/agents
      dockerfile: Dockerfile
      args:
        AGENT_NAME: ceo
    ports:
      - "8081:8080"
    env_file:
      - .env
      - src/agents/ceo/.env
    volumes:
      - ceo-workspace:/workspace
      - ./artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

  researcher:
    <<: *agent
    build:
      context: src/agents
      dockerfile: researcher/Dockerfile
    ports:
      - "8082:8080"
    env_file:
      - .env
      - src/agents/researcher/.env
    volumes:
      - researcher-workspace:/workspace
      - ./artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

  data:
    <<: *agent
    build:
      context: src/agents
      dockerfile: data/Dockerfile
    ports:
      - "8083:8080"
    env_file:
      - .env
      - src/agents/data/.env
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - data-workspace:/workspace
      - ./artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

  writer:
    <<: *agent
    build:
      context: src/agents
      dockerfile: writer/Dockerfile
    ports:
      - "8084:8080"
    env_file:
      - .env
      - src/agents/writer/.env
    volumes:
      - writer-workspace:/workspace
      - ./artifacts:/artifacts
    depends_on:
      paperclip:
        condition: service_healthy

volumes:
  paperclip-data:
    name: paperclip-eval-data
  ceo-workspace:
    name: paperclip-eval-ceo-workspace
  researcher-workspace:
    name: paperclip-eval-researcher-workspace
  data-workspace:
    name: paperclip-eval-data-workspace
  writer-workspace:
    name: paperclip-eval-writer-workspace
